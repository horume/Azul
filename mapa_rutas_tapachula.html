<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Interactive Map of Tapachula Routes</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
    <link rel="stylesheet" href="styles.css" />
    <style>
        /* Styles matching Tuxtla design */
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
        }
        .map {
            height: 500px;
        }
        .search-container {
            margin: 20px;
        }
        #route-info {
            margin: 20px;
            background-color: rgba(255, 255, 255, 0.8);
            padding: 15px;
            border-radius: 8px;
        }
    </style>
</head>
<body>
    <div class="search-container">
        <input type="text" id="route-search" placeholder="Search by route number..." />
    </div>
    <div id="route-info"></div>
    <div id="map" class="map"></div>
    <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
    <script>
        var map = L.map('map').setView([14.8333, -92.4167], 13); // Centered on Tapachula

        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            maxZoom: 19,
        }).addTo(map);

        const routes = [
            { number: 'ruta_01tapd', lat: 14.827, lng: -92.416, details: 'Details about ruta_01tapd' },
            { number: 'ruta_02tapd', lat: 14.828, lng: -92.417, details: 'Details about ruta_02tapd' },
            // Add additional routes up to ruta_017tapreg
            { number: 'ruta_017tapreg', lat: 14.829, lng: -92.418, details: 'Details about ruta_017tapreg' },
        ];

        routes.forEach(route => {
            var marker = L.marker([route.lat, route.lng]).addTo(map);
            marker.bindPopup(route.details);

            marker.on('click', function() {
                document.getElementById('route-info').innerText = route.details;
            });
        });

        document.getElementById('route-search').addEventListener('input', function(e) {
            let searchValue = e.target.value.toLowerCase();
            routes.forEach(route => {
                if (route.number.toLowerCase().includes(searchValue)) {
                    map.setView([route.lat, route.lng], 15);
                }
            });
        });
    </script>
</body>
</html>
